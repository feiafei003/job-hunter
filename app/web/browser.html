<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>远程浏览器 · 招聘网站登录</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #0f1115; color: #e6e6e6;
  }
  header {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    padding: 10px 14px; background: #171a21; border-bottom: 1px solid #262a33;
    position: sticky; top: 0; z-index: 10;
  }
  header .brand { font-weight: 600; margin-right: 6px; color: #7aa2ff; }
  button, select, input {
    font: inherit; color: #e6e6e6; background: #232733; border: 1px solid #353b49;
    border-radius: 6px; padding: 6px 10px; cursor: pointer;
  }
  button:hover { background: #2c3140; }
  button.site { background: #1f3a5f; border-color: #2b5388; }
  button.site:hover { background: #28507f; }
  button.primary { background: #2b6cff; border-color: #2b6cff; color: #fff; }
  input.url { flex: 1; min-width: 200px; cursor: text; }
  .badge { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #333; }
  .badge.on { background: #1d6b3a; color: #d6ffe1; }
  .badge.off { background: #5a2230; color: #ffd6dd; }
  #status { font-size: 13px; color: #9aa4b2; margin-left: auto; }
  #stage {
    display: flex; justify-content: center; align-items: flex-start;
    padding: 14px; min-height: 60vh;
  }
  #screen {
    background: #000; max-width: 100%; height: auto; border: 1px solid #262a33;
    border-radius: 6px; box-shadow: 0 6px 30px rgba(0,0,0,.5); cursor: default;
    outline: none;
  }
  #hint {
    text-align: center; color: #9aa4b2; padding: 40px 20px; line-height: 1.8;
  }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .logins { display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head>
<body>
<header>
  <span class="brand">远程浏览器</span>
  <div class="logins" id="siteBtns"></div>
  <input class="url" id="urlBar" placeholder="输入网址后回车，例如 https://www.zhipin.com/" />
  <button id="goBtn">打开</button>
  <select id="targetSel" title="当前标签页"></select>
  <button id="refreshBtn" title="刷新标签列表">刷新</button>
  <span id="status">未连接</span>
</header>

<div id="stage">
  <div id="hint">
    <p>点上面的站点按钮（如「智联」）即可打开对应登录页，下面会实时显示页面画面。</p>
    <p>可以直接用鼠标点击、用键盘输入；扫码登录请用手机扫屏幕上的二维码。</p>
    <p>登录成功后登录态会自动保存，之后抓取自动复用。</p>
  </div>
  <canvas id="screen" tabindex="0" style="display:none"></canvas>
</div>

<script>
const $ = (id) => document.getElementById(id);
const statusEl = $("status");
const canvas = $("screen");
const ctx = canvas.getContext("2d");
const hint = $("hint");

let viewPort = 9223;
let loginUrls = {};
let ws = null;
let msgId = 0;
let lastMeta = null;     // 最近一帧的 metadata（坐标换算用）
let curTargetId = null;

const SITE_LABELS = {
  zhilian: "智联", boss: "BOSS直聘", liepin: "猎聘", job51: "前程无忧", linkedin: "领英",
};

function setStatus(t, cls) {
  statusEl.textContent = t;
  statusEl.style.color = cls === "ok" ? "#7be3a0" : cls === "err" ? "#ff8a9b" : "#9aa4b2";
}

async function api(path, opts) {
  const r = await fetch(path, Object.assign({ headers: { "Content-Type": "application/json" } }, opts));
  if (r.status === 401) { setStatus("未登录管理员，请先在 /admin 登录", "err"); throw new Error("401"); }
  if (!r.ok) { const t = await r.text(); throw new Error(t || r.status); }
  return r.json();
}

async function loadTargets(autoConnectId) {
  const data = await api("/api/browser/targets");
  viewPort = data.view_port || viewPort;
  loginUrls = data.login_urls || {};
  buildSiteButtons();
  const sel = $("targetSel");
  sel.innerHTML = "";
  (data.targets || []).forEach((t) => {
    const o = document.createElement("option");
    o.value = t.id;
    const title = (t.title || t.url || "").slice(0, 40);
    o.textContent = title || t.id.slice(0, 8);
    sel.appendChild(o);
  });
  if (autoConnectId) {
    sel.value = autoConnectId;
    connect(autoConnectId);
  } else if (!curTargetId && sel.options.length) {
    sel.value = sel.options[0].value;
  }
  return data.targets || [];
}

let siteBtnsBuilt = false;
function buildSiteButtons() {
  if (siteBtnsBuilt) return;
  const box = $("siteBtns");
  box.innerHTML = "";
  Object.keys(loginUrls).forEach((site) => {
    const b = document.createElement("button");
    b.className = "site";
    b.textContent = SITE_LABELS[site] || site;
    b.onclick = () => openUrl(loginUrls[site]);
    box.appendChild(b);
  });
  siteBtnsBuilt = true;
}

async function openUrl(url) {
  if (!url) return;
  setStatus("正在打开 " + url + " ...", "");
  try {
    const r = await api("/api/browser/open", { method: "POST", body: JSON.stringify({ url }) });
    await new Promise((res) => setTimeout(res, 600));
    await loadTargets(r.id);
  } catch (e) {
    setStatus("打开失败：" + e.message, "err");
  }
}

// ---------- CDP screencast ----------
function send(method, params) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ id: ++msgId, method, params: params || {} }));
}

function connect(targetId) {
  if (!targetId) return;
  if (ws) { try { ws.close(); } catch (e) {} ws = null; }
  curTargetId = targetId;
  const host = location.hostname;
  const url = `ws://${host}:${viewPort}/devtools/page/${targetId}`;
  setStatus("连接中…", "");
  ws = new WebSocket(url);
  ws.onopen = () => {
    setStatus("已连接", "ok");
    hint.style.display = "none";
    canvas.style.display = "block";
    canvas.focus();
    send("Page.enable");
    send("Emulation.setDeviceMetricsOverride", { width: 1280, height: 800, deviceScaleFactor: 1, mobile: false });
    send("Page.startScreencast", { format: "jpeg", quality: 70, maxWidth: 1280, maxHeight: 800, everyNthFrame: 1 });
  };
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (e) { return; }
    if (msg.method === "Page.screencastFrame") {
      const p = msg.params;
      lastMeta = p.metadata;
      const img = new Image();
      img.onload = () => {
        if (canvas.width !== img.width || canvas.height !== img.height) {
          canvas.width = img.width; canvas.height = img.height;
        }
        ctx.drawImage(img, 0, 0);
      };
      img.src = "data:image/jpeg;base64," + p.data;
      send("Page.screencastFrameAck", { sessionId: p.sessionId });
    }
  };
  ws.onclose = () => { setStatus("连接已断开（点『刷新』或重选标签重连）", "err"); };
  ws.onerror = () => { setStatus("连接出错（确认能访问 " + host + ":" + viewPort + "）", "err"); };
}

// ---------- 输入转发 ----------
function toPageCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const mw = lastMeta ? lastMeta.deviceWidth : canvas.width;
  const mh = lastMeta ? lastMeta.deviceHeight : canvas.height;
  return {
    x: Math.round((e.clientX - rect.left) / rect.width * mw),
    y: Math.round((e.clientY - rect.top) / rect.height * mh),
  };
}

canvas.addEventListener("mousedown", (e) => {
  e.preventDefault(); canvas.focus();
  const { x, y } = toPageCoords(e);
  send("Input.dispatchMouseEvent", { type: "mousePressed", x, y, button: "left", buttons: 1, clickCount: 1 });
});
canvas.addEventListener("mouseup", (e) => {
  e.preventDefault();
  const { x, y } = toPageCoords(e);
  send("Input.dispatchMouseEvent", { type: "mouseReleased", x, y, button: "left", buttons: 0, clickCount: 1 });
});
let lastMove = 0;
canvas.addEventListener("mousemove", (e) => {
  const now = Date.now();
  if (now - lastMove < 40) return;  // 限频，别压垮 ws
  lastMove = now;
  const { x, y } = toPageCoords(e);
  send("Input.dispatchMouseEvent", { type: "mouseMoved", x, y, button: "none", buttons: 0 });
});
canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  const { x, y } = toPageCoords(e);
  send("Input.dispatchMouseEvent", { type: "mouseWheel", x, y, deltaX: e.deltaX, deltaY: e.deltaY });
}, { passive: false });

const SPECIAL_KEYS = {
  Enter: 13, Backspace: 8, Tab: 9, Escape: 27, Delete: 46,
  ArrowLeft: 37, ArrowUp: 38, ArrowRight: 39, ArrowDown: 40,
};
canvas.addEventListener("keydown", (e) => {
  if (!ws || ws.readyState !== 1) return;
  // 可打印单字符：直接插入文本（兼容中文/IME 输出）
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    send("Input.insertText", { text: e.key });
    return;
  }
  const vk = SPECIAL_KEYS[e.key];
  if (vk) {
    e.preventDefault();
    const base = { key: e.key, code: e.code, windowsVirtualKeyCode: vk, nativeVirtualKeyCode: vk };
    send("Input.dispatchKeyEvent", Object.assign({ type: "keyDown" }, base));
    send("Input.dispatchKeyEvent", Object.assign({ type: "keyUp" }, base));
  }
});
// 中文输入法提交的整段文字
canvas.addEventListener("paste", (e) => {
  const text = (e.clipboardData || window.clipboardData).getData("text");
  if (text) { e.preventDefault(); send("Input.insertText", { text }); }
});

// ---------- 绑定 UI ----------
$("goBtn").onclick = () => openUrl($("urlBar").value.trim());
$("urlBar").addEventListener("keydown", (e) => { if (e.key === "Enter") openUrl($("urlBar").value.trim()); });
$("refreshBtn").onclick = () => loadTargets();
$("targetSel").onchange = (e) => connect(e.target.value);

loadTargets().catch((e) => setStatus("初始化失败：" + e.message, "err"));
</script>
</body>
</html>
